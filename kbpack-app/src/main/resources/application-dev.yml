# Dev profile: connect to dependencies from docker-compose.dev.yml by default.
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kbpack}
    username: ${SPRING_DATASOURCE_USERNAME:kbpack}
    password: ${SPRING_DATASOURCE_PASSWORD:kbpack}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    store-type: jdbc
    timeout: 12h
    jdbc:
      initialize-schema: never

server:
  servlet:
    session:
      cookie:
        secure: false

kbpack:
  preview:
    enforce-host: ${PREVIEW_ENFORCE_HOST:false}
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
  search:
    meilisearch:
      host: ${MEILI_HOST:http://localhost:7700}
      api-key: ${MEILI_MASTER_KEY:dev-meili-master-key-change-me}
  init:
    admin-username: ${INIT_ADMIN_USERNAME:admin}
    admin-password: ${INIT_ADMIN_PASSWORD:admin123456}

logging:
  level:
    com.kbpack: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
