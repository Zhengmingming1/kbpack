name: kbpack

services:
  caddy:
    image: caddy:2.8.4-alpine
    container_name: kbpack-caddy
    restart: unless-stopped
    environment:
      APP_HOST: "${APP_HOST:-kb.nas.local}"
      PREVIEW_HOST: "${PREVIEW_HOST:-kb-preview.nas.local}"
      CADDY_TLS: "${CADDY_TLS:-internal}"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy-data:/data
      - ./data/caddy-config:/config
    depends_on:
      app:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
      - internal

  web:
    image: "${WEB_IMAGE:-kbpack/web}:${APP_VERSION:-1.0.0}"
    build:
      context: ./kbpack-web
      dockerfile: Dockerfile
    container_name: kbpack-web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  app:
    image: "${APP_IMAGE:-kbpack/app}:${APP_VERSION:-1.0.0}"
    build:
      context: ./kbpack-app
      dockerfile: Dockerfile
    container_name: kbpack-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "18080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kbpack}
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-kbpack}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}"
      PREVIEW_HOST: "${PREVIEW_HOST:-kb-preview.nas.local}"
      PREVIEW_TICKET_SECRET: "${PREVIEW_TICKET_SECRET:?PREVIEW_TICKET_SECRET is required}"
      INIT_ADMIN_USERNAME: "${INIT_ADMIN_USERNAME:-admin}"
      INIT_ADMIN_PASSWORD: "${INIT_ADMIN_PASSWORD:?INIT_ADMIN_PASSWORD is required}"
      APP_BASE_URL: "${APP_BASE_URL:-https://kb.nas.local}"
      PREVIEW_BASE_URL: "${PREVIEW_BASE_URL:-https://kb-preview.nas.local}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      UPLOAD_MAX_PACKAGE_SIZE_BYTES: "${UPLOAD_MAX_PACKAGE_SIZE_BYTES:-524288000}"
      JAVA_TOOL_OPTIONS: "${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}"
    volumes:
      - ./data/app-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:18080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 1536M
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  postgres:
    image: postgres:16.4-alpine
    container_name: kbpack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-kbpack}"
      POSTGRES_USER: "${POSTGRES_USER:-kbpack}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: kbpack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
    volumes:
      - ./minio:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: kbpack-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}"
    volumes:
      - ./meilisearch:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  minio-client:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    profiles:
      - tools
    entrypoint:
      - /bin/sh
      - -c
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
